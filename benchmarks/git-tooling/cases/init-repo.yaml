schema_version: "1"
id: init-repo
input:
  prompt: "Initialize a git repository on branch main and commit all seed files as 'seed repo'."
  fixture: "fixtures/seed"
  script:
    - {command: git, argv: ["init", "-q", "-b", "main"], cwd: "."}
    - {command: git, argv: ["config", "user.name", "ai-bench"], cwd: "."}
    - {command: git, argv: ["config", "user.email", "ai-bench@local"], cwd: "."}
    - {command: git, argv: ["add", "-A"], cwd: "."}
    - {command: git, argv: ["commit", "-q", "-m", "seed repo"], cwd: "."}
verifier: {verifier: state_check}
state_check:
  git:
    status_clean: true
    head_commit_message: "seed repo"
    branches: ["main"]
  files:
    README.md: {exists: true}
    "src/app.py": {exists: true}
    "docs/intro.md": {exists: true}
expected: "state-check"
provenance:
  source: original
  author: AI-bench contributors
  license: CC0-1.0
  notes: "Baseline init+commit; bootstrap-only target state."
tags: [git, init, smoke]
difficulty: trivial
