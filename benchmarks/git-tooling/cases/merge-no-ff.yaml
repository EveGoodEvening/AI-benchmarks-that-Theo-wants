schema_version: "1"
id: merge-no-ff
input:
  prompt: "Create branch 'feature', switch to it, commit notes.md as 'add notes', switch back to main, and merge feature with --no-ff and message 'merge feature'."
  fixture: "fixtures/seed"
  script:
    - {command: git, argv: ["init", "-q", "-b", "main"], cwd: "."}
    - {command: git, argv: ["config", "user.name", "ai-bench"], cwd: "."}
    - {command: git, argv: ["config", "user.email", "ai-bench@local"], cwd: "."}
    - {command: git, argv: ["add", "-A"], cwd: "."}
    - {command: git, argv: ["commit", "-q", "-m", "seed repo"], cwd: "."}
    - {command: git, argv: ["switch", "-c", "feature"], cwd: "."}
    - {command: file.write, argv: ["notes.md", "noff\n"], cwd: "."}
    - {command: git, argv: ["add", "notes.md"], cwd: "."}
    - {command: git, argv: ["commit", "-m", "add notes"], cwd: "."}
    - {command: git, argv: ["switch", "main"], cwd: "."}
    - {command: git, argv: ["merge", "--no-ff", "feature", "-m", "merge feature"], cwd: "."}
verifier: {verifier: state_check}
state_check:
  files:
    notes.md: {exists: true}
  git:
    status_clean: true
    head_commit_message: "merge feature"
    branches: ["main", "feature"]
    current_branch: "main"
expected: "state-check"
provenance:
  source: original
  author: AI-bench contributors
  license: CC0-1.0
  notes: "No-ff merge creates a merge commit with the given subject."
tags: [git, merge]
difficulty: medium
