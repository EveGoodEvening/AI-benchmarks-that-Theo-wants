schema_version: "1"
id: stash-pop
input:
  prompt: "Modify README.md to 'wip\n', stash the change, then pop the stash so README.md is modified again in the working tree. Do not commit."
  fixture: "fixtures/seed"
  script:
    - {command: git, argv: ["init", "-q", "-b", "main"], cwd: "."}
    - {command: git, argv: ["config", "user.name", "ai-bench"], cwd: "."}
    - {command: git, argv: ["config", "user.email", "ai-bench@local"], cwd: "."}
    - {command: git, argv: ["add", "-A"], cwd: "."}
    - {command: git, argv: ["commit", "-q", "-m", "seed repo"], cwd: "."}
    - {command: file.write, argv: ["README.md", "wip\n"], cwd: "."}
    - {command: git, argv: ["stash"], cwd: "."}
    - {command: git, argv: ["stash", "pop"], cwd: "."}
verifier: {verifier: state_check}
state_check:
  files:
    README.md: {exists: true}
  git:
    head_commit_message: "seed repo"
    branches: ["main"]
expected: "state-check"
provenance:
  source: original
  author: AI-bench contributors
  license: CC0-1.0
  notes: "Stash then pop leaves working tree dirty; status_clean not asserted."
tags: [git, stash]
difficulty: hard
