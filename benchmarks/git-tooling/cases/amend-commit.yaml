schema_version: "1"
id: amend-commit
input:
  prompt: "Create notes.md, stage and commit it as 'add notes', then amend the commit message to 'add notes (amended)'."
  fixture: "fixtures/seed"
  script:
    - {command: git, argv: ["init", "-q", "-b", "main"], cwd: "."}
    - {command: git, argv: ["config", "user.name", "ai-bench"], cwd: "."}
    - {command: git, argv: ["config", "user.email", "ai-bench@local"], cwd: "."}
    - {command: git, argv: ["add", "-A"], cwd: "."}
    - {command: git, argv: ["commit", "-q", "-m", "seed repo"], cwd: "."}
    - {command: file.write, argv: ["notes.md", "amended\n"], cwd: "."}
    - {command: git, argv: ["add", "notes.md"], cwd: "."}
    - {command: git, argv: ["commit", "-m", "add notes"], cwd: "."}
    - {command: git, argv: ["commit", "--amend", "-m", "add notes (amended)"], cwd: "."}
verifier: {verifier: state_check}
state_check:
  files:
    notes.md: {exists: true}
  git:
    status_clean: true
    head_commit_message: "add notes (amended)"
    branches: ["main"]
expected: "state-check"
provenance:
  source: original
  author: AI-bench contributors
  license: CC0-1.0
  notes: "Commit --amend rewrites the head subject."
tags: [git, commit, amend]
difficulty: medium
