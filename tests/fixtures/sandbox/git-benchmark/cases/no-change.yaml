schema_version: "1"
id: no-change
input:
  prompt: "Run a harmless git status and make no changes."
  fixture: "fixtures/repo"
  script:
    - command: git
      argv: ["init", "-q", "-b", "main"]
      cwd: "."
    - command: git
      argv: ["config", "user.name", "fixture"]
      cwd: "."
    - command: git
      argv: ["config", "user.email", "fixture@ai-bench.local"]
      cwd: "."
    - command: git
      argv: ["add", "README.md"]
      cwd: "."
    - command: git
      argv: ["commit", "-q", "-m", "initial fixture"]
      cwd: "."
    - command: git
      argv: ["status", "--short"]
      cwd: "."
expected: "state-check-stub"
tags:
  - smoke
difficulty: easy
provenance:
  source: original
  license: MIT
state_check:
  git:
    status_clean: true
  absent:
    - notes.md
